# ============================================================
# CubeMeta — Render.com Konfigürasyonu (A ve B Servisleri)
# ============================================================
# Render dashboard'da iki ayrı "Web Service" oluşturun:
#   - cubemeta-backend-a  (A grubu)
#   - cubemeta-backend-b  (B grubu)
# Her ikisi de aynı repo'dan deploy edilir.
# ============================================================
#
# ÖNEMLİ: API endpoint yolu /api/v1/solve olarak düzeltildi (v2.1)
# Android uygulaması CubeSolverApi.kt'da @POST("api/v1/solve") kullanıyor.
# ============================================================

services:
  # ── A Grubu ───────────────────────────────────────────────
  - type: web
    name: cubemeta-backend-a
    runtime: python
    repo: https://github.com/KULLANICI_ADINIZ/CubeMeta  # ← değiştirin
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false   # Render dashboard'dan manuel girin
      - key: PYTHON_VERSION
        value: "3.12"

  # ── B Grubu ───────────────────────────────────────────────
  - type: web
    name: cubemeta-backend-b
    runtime: python
    repo: https://github.com/KULLANICI_ADINIZ/CubeMeta  # ← değiştirin
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
